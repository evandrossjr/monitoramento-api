<!DOCTYPE html>
<html lang="pt-br">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Monitor de APIs — Login</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@400;500&family=IBM+Plex+Sans:wght@300;400;500&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg: #0c0c0f;
      --surface: #13131a;
      --border: #1e1e2a;
      --accent: #e94560;
      --text: #e0e0e0;
      --muted: #555566;
      --green: #00d97e;
    }

    body {
      background: var(--bg);
      color: var(--text);
      font-family: 'IBM Plex Sans', sans-serif;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 20px;
    }

    /* grid de fundo sutil */
    body::before {
      content: '';
      position: fixed;
      inset: 0;
      background-image:
        linear-gradient(rgba(233,69,96,0.03) 1px, transparent 1px),
        linear-gradient(90deg, rgba(233,69,96,0.03) 1px, transparent 1px);
      background-size: 40px 40px;
      pointer-events: none;
    }

    .card {
      width: 100%;
      max-width: 380px;
      background: var(--surface);
      border: 1px solid var(--border);
      padding: 40px 36px;
      position: relative;
    }

    /* linha vermelha no topo */
    .card::before {
      content: '';
      position: absolute;
      top: 0; left: 0; right: 0;
      height: 2px;
      background: var(--accent);
    }

    .logo {
      display: flex;
      align-items: center;
      gap: 10px;
      margin-bottom: 32px;
    }

    .logo-dot {
      width: 8px;
      height: 8px;
      background: var(--accent);
      border-radius: 50%;
      animation: pulse 2s infinite;
    }

    @keyframes pulse {
      0%, 100% { opacity: 1; }
      50% { opacity: 0.3; }
    }

    .logo-text {
      font-family: 'IBM Plex Mono', monospace;
      font-size: 13px;
      color: var(--muted);
      letter-spacing: 0.08em;
      text-transform: uppercase;
    }

    h1 {
      font-size: 22px;
      font-weight: 500;
      color: var(--text);
      margin-bottom: 6px;
      letter-spacing: -0.02em;
    }

    .subtitle {
      font-size: 13px;
      color: var(--muted);
      margin-bottom: 32px;
    }

    .field {
      margin-bottom: 16px;
    }

    label {
      display: block;
      font-size: 11px;
      font-family: 'IBM Plex Mono', monospace;
      text-transform: uppercase;
      letter-spacing: 0.08em;
      color: var(--muted);
      margin-bottom: 8px;
    }

    input {
      width: 100%;
      background: var(--bg);
      border: 1px solid var(--border);
      color: var(--text);
      font-family: 'IBM Plex Mono', monospace;
      font-size: 14px;
      padding: 11px 14px;
      outline: none;
      transition: border-color 0.2s;
    }

    input:focus {
      border-color: var(--accent);
    }

    input::placeholder { color: var(--muted); }

    .erro {
      background: rgba(233,69,96,0.08);
      border: 1px solid rgba(233,69,96,0.3);
      color: var(--accent);
      font-size: 12px;
      font-family: 'IBM Plex Mono', monospace;
      padding: 10px 14px;
      margin-bottom: 16px;
    }

    button {
      width: 100%;
      background: var(--accent);
      color: white;
      border: none;
      font-family: 'IBM Plex Sans', sans-serif;
      font-size: 14px;
      font-weight: 500;
      padding: 12px;
      cursor: pointer;
      margin-top: 8px;
      transition: opacity 0.2s;
      letter-spacing: 0.02em;
    }

    button:hover { opacity: 0.88; }

    .footer {
      margin-top: 28px;
      padding-top: 20px;
      border-top: 1px solid var(--border);
      display: flex;
      align-items: center;
      gap: 8px;
    }

    .status-dot {
      width: 6px;
      height: 6px;
      background: var(--green);
      border-radius: 50%;
    }

    .footer-text {
      font-size: 11px;
      font-family: 'IBM Plex Mono', monospace;
      color: var(--muted);
    }
  </style>
</head>
<body>
  <div class="card">
    <div class="logo">
      <div class="logo-dot"></div>
      <span class="logo-text">API Monitor</span>
    </div>

    <h1>Acesso restrito</h1>
    <p class="subtitle">Entre com suas credenciais para continuar.</p>

    {% if erro %}
    <div class="erro">{{ erro }}</div>
    {% endif %}

    <form method="POST" action="/login">
      <div class="field">
        <label>Usuário</label>
        <input type="text" name="usuario" placeholder="admin" autocomplete="username" required>
      </div>
      <div class="field">
        <label>Senha</label>
        <input type="password" name="senha" placeholder="••••••••" autocomplete="current-password" required>
      </div>
      <button type="submit">Entrar</button>
    </form>

    <div class="footer">
      <div class="status-dot"></div>
      <span class="footer-text">Sistema operacional</span>
    </div>
  </div>
</body>
</html>
